name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION || 'asia-northeast3' }}
  ARTIFACT_REGISTRY_REPOSITORY: ${{ vars.ARTIFACT_REGISTRY_REPOSITORY || 'gke-gitops-images' }}
  IMAGE_NAME: sample-app

jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest

    outputs:
      image_uri: ${{ steps.image.outputs.uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate workflow configuration
        run: |
          : "${PROJECT_ID:?Set repository variable GCP_PROJECT_ID}"
          : "${REGION:?Set repository variable GCP_REGION or rely on the default}"
          : "${ARTIFACT_REGISTRY_REPOSITORY:?Set repository variable ARTIFACT_REGISTRY_REPOSITORY or rely on the default}"

      - name: Compose image URI
        id: image
        run: |
          IMAGE_URI="${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REGISTRY_REPOSITORY}/${IMAGE_NAME}:${GITHUB_SHA}"
          echo "uri=${IMAGE_URI}" >> "${GITHUB_OUTPUT}"
          echo "IMAGE_URI=${IMAGE_URI}" >> "${GITHUB_ENV}"

      - name: Build Docker image
        run: docker build -t "${IMAGE_URI}" ./app

  push:
    name: Push image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate workflow configuration
        run: |
          : "${PROJECT_ID:?Set repository variable GCP_PROJECT_ID}"
          : "${REGION:?Set repository variable GCP_REGION or rely on the default}"
          : "${ARTIFACT_REGISTRY_REPOSITORY:?Set repository variable ARTIFACT_REGISTRY_REPOSITORY or rely on the default}"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Rebuild Docker image for push
        env:
          IMAGE_URI: ${{ needs.build.outputs.image_uri }}
        run: docker build -t "${IMAGE_URI}" ./app

      - name: Push Docker image
        env:
          IMAGE_URI: ${{ needs.build.outputs.image_uri }}
        run: docker push "${IMAGE_URI}"
